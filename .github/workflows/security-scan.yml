name: Java Microservice Security Scan (Fixed JAVA_HOME)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  checkout:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

  setup-java:
    runs-on: ubuntu-latest
    needs: checkout
    steps:
      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: '17'
      - name: Verify Java
        run: java -version

  build:
    runs-on: ubuntu-latest
    needs: setup-java
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Build with Maven
        run: mvn clean install -B
      - name: Show Build Output
        run: ls -l target/

  scan:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: '17'
      - name: Run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'simple-java-microservice'
          path: '.'
          format: 'HTML'
          out: 'dependency-check-reports'
          docker: false   # RUNS USING HOST JAVA, FIXES JAVA_HOME ERROR
      - name: List Scan Reports
        run: ls -l dependency-check-reports

  report:
    runs-on: ubuntu-latest
    needs: scan
    steps:
      - name: Upload Vulnerability Report
        uses: actions/upload-artifact@v4
        with:
          name: depcheck-report
          path: dependency-check-reports
