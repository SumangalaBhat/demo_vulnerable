name: Java Microservice DevSecOps Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # =========================
  # Stage 1: Checkout
  # =========================
  checkout:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

  # =========================
  # Stage 2: Setup Java
  # =========================
  setup-java:
    runs-on: ubuntu-latest
    needs: checkout
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: '17'
      - name: Verify Java
        run: java -version

  # =========================
  # Stage 3: Build
  # =========================
  build:
    runs-on: ubuntu-latest
    needs: setup-java
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Build Project
        run: mvn clean install -DskipTests

  # =========================
  # Stage 4: Vulnerability Scan (OFFLINE MODE)
  # =========================
  scan:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: '17'

      - name: Run OWASP Dependency Check (Offline)
        run: |
          mvn org.owasp:dependency-check-maven:9.0.9:check \
            -f ./pom.xml \
            -Ddependency-check.skipUpdate=true \
            -Ddependency-check.autoUpdate=false \
            -DfailOnError=false \
            -Dformat=HTML

      - name: Debug - Find Report
        run: find . -name "dependency-check-report.html"

  # =========================
  # Stage 5: Upload Report
  # =========================
  report:
    runs-on: ubuntu-latest
    needs: scan
    steps:
      - name: Upload Vulnerability Report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: |
            target/dependency-check-report.html
            target/site/dependency-check-report.html
