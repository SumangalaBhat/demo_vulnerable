name: Java Microservice Security Scan (No Docker)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # =========================
  # Stage 1: Checkout
  # =========================
  checkout:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

  # =========================
  # Stage 2: Setup Java
  # =========================
  setup-java:
    runs-on: ubuntu-latest
    needs: checkout
    steps:
      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: '17'
      - name: Verify Java
        run: java -version

  # =========================
  # Stage 3: Build
  # =========================
  build:
    runs-on: ubuntu-latest
    needs: setup-java
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Build Project
        run: mvn clean install -B

  # =========================
  # Stage 4: Vulnerability Scan
  # =========================
  scan:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: '17'

      - name: Run Dependency Check
        run: |
          mvn org.owasp:dependency-check-maven:check \
          -DfailOnError=false \
          -Dnvd.api.key=${{ secrets.NVD_API_KEY }}
      
      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: target/dependency-check-report.html

  # =========================
  # Stage 5: Upload Report
  # =========================
  report:
    runs-on: ubuntu-latest
    needs: scan
    steps:
      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: target/dependency-check-report.html

  # =========================
  # Stage 6: Fail on Vulnerabilities
  # =========================
  fail-on-vuln:
    runs-on: ubuntu-latest
    needs: scan
    steps:
      - name: Fail if vulnerabilities found
        run: |
          if grep -q "CRITICAL" target/dependency-check-report.html; then
            echo "Critical vulnerabilities found!"
            exit 1
          else
            echo "No critical vulnerabilities."
          fi
