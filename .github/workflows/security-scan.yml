name: Java Microservice Security Scan (Staged)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # =========================
  # Stage 1: Checkout Code
  # =========================
  checkout:
    runs-on: ubuntu-latest
    outputs:
      workspace: ${{ github.workspace }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Show Current Directory
        run: pwd

  # =========================
  # Stage 2: Setup Java
  # =========================
  setup-java:
    runs-on: ubuntu-latest
    needs: checkout
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: '17'
      - name: Verify Java Version
        run: java -version

  # =========================
  # Stage 3: Build Project
  # =========================
  build:
    runs-on: ubuntu-latest
    needs: setup-java
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Build with Maven
        run: mvn clean install -B
      - name: Verify Build Output
        run: ls -l target/

  # =========================
  # Stage 4: Vulnerability Scan
  # =========================
  scan:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: '17'
      - name: Run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'simple-java-microservice'
          path: '.'
          format: 'HTML'
          out: 'dependency-check-reports'
          docker: false
      - name: Show Scan Reports
        run: ls -l dependency-check-reports

  # =========================
  # Stage 5: Upload Reports
  # =========================
  report:
    runs-on: ubuntu-latest
    needs: scan
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Upload Vulnerability Report
        uses: actions/upload-artifact@v4
        with:
          name: depcheck-report
          path: dependency-check-reports

  # =========================
  # Stage 6: Fail on Critical Vulnerabilities
  # =========================
  fail-on-critical:
    runs-on: ubuntu-latest
    needs: scan
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Check for Critical Vulnerabilities
        run: |
          if grep -q "Critical" dependency-check-reports/dependency-check-report.html; then
            echo "Critical vulnerabilities found. Failing the workflow."
            exit 1
          else
            echo "No critical vulnerabilities found."
          fi
