name: Security Scan

# Trigger on pushes and pull requests to main branch
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-scan:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Set up Java
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: '17'

      # Step 3: Build the project using Maven
      - name: Build with Maven
        run: mvn clean install

      # Step 4: Run OWASP Dependency Check
      - name: Run OWASP Dependency Check
        uses: OWASP/dependency-check-action@v2
        with:
          scan-path: .
          format: 'ALL'         # Generate HTML, XML, CSV reports
          project: 'java-microservice-vuln'
          fail-on-error: true   # Fail workflow if critical vulnerabilities are found

      # Step 5: Upload Security Report as Artifact
      - name: Upload Dependency Check Report
        uses: actions/upload-artifact@v3
        with:
          name: dependency-check-report
          path: dependency-check-report.html
